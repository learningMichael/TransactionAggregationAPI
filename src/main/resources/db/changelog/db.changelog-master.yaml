databaseChangeLog:

  - changeSet:
      id: 1
      author: michael
      comment: "Create the transactions table with all required columns and an index on account_id"
      changes:
        - createTable:
            tableName: transactions
            columns:

              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: "UUID primary key — generated by the application, not the database"

              - column:
                  name: account_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                  remarks: "Customer account this transaction belongs to"

              - column:
                  name: amount
                  type: NUMERIC(19, 4)
                  constraints:
                    nullable: false
                  remarks: "Monetary value — 4 decimal places for financial precision"

              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Exact date and time the transaction occurred"

              - column:
                  name: description
                  type: VARCHAR(255)
                  remarks: "Human-readable description from the originating bank"

              - column:
                  name: category
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: "Classified category (e.g. GROCERIES, FUEL, DINING)"

        - createIndex:
            indexName: idx_transactions_account_id
            tableName: transactions
            columns:
              - column:
                  name: account_id
            remarks: "Index for fast lookups by account — the most common query pattern"
